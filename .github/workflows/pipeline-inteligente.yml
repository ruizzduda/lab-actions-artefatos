name: Pipeline Inteligente

on:
  workflow_dispatch:

  schedule:
    - cron: '0 2 * * *'

  push:
    branches:
      - 'feature/**'
    paths:
      - 'src/**'
      - '!src/docs/**'

jobs:
  job_gerador:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar relatórios
        run: |
          mkdir saida_build
          echo "Relatorio 1" > saida_build/relatorio1.txt
          echo "Relatorio 2" > saida_build/relatorio2.txt

      - name: Upload Artefato
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: saida_build/

  job_auditoria:
    runs-on: ubuntu-latest
    needs: job_gerador

    steps:
      - name: Download Artefato
        uses: actions/download-artifact@v4
        with:
          name: meus-relatorios-oficiais

      - name: Verificar arquivos
        run: |
          ls -R
          cat relatorio1.txt